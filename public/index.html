<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BTSAVE — Full On-Chain Arbitrum</title>
<style>
  :root {
    --bg: #121016; --card: #1a171f; --border: #2a2530;
    --text: #e8e4ed; --muted: #7a7285; --accent: #f6b06b;
    --green: #6ee7a0; --red: #f87171; --orange: #f6b06b;
    --purple: #c4a6e8; --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
  .container { max-width: 480px; margin: 0 auto; padding: 12px; }
  .header { background: linear-gradient(135deg, rgba(246,176,107,0.10) 0%, rgba(110,231,160,0.08) 50%, rgba(248,113,113,0.06) 100%); border: 1px solid rgba(246,176,107,0.15); border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(246,176,107,0.06) 0%, transparent 70%); pointer-events: none; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header h1 span { background: linear-gradient(135deg, var(--orange), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .price-big { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
  .phase-badge { padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .phase-IDLE { background: var(--muted); color: #fff; }
  .phase-HEDGED { background: linear-gradient(135deg, var(--orange), var(--red)); color: #fff; }
  .phase-CLOSING { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .card { background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
  .card.full { grid-column: 1 / -1; }
  .card-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .card-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .card-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .orange { color: var(--orange); }
  .purple { color: var(--purple); }
  .blue { color: var(--blue); }
  .section { background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
  .section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
  .strat-var { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .strat-var:last-child { border: none; }
  .strat-var .label { color: var(--muted); }
  .strat-var .val { font-weight: 700; }
  .hf-bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .hf-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .footer { text-align: center; color: var(--muted); font-size: 10px; padding: 8px 0 20px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .nav-toggle { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
  .nav-btn { padding: 3px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; text-decoration: none; border: 1px solid var(--border); color: var(--muted); background: transparent; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .nav-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .nav-btn:not(.active):hover { border-color: var(--muted); color: var(--text); }
  .pos-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .pos-row:last-child { border: none; }
  .dao-link { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; background: rgba(96,165,250,0.15); color: var(--blue); text-decoration: none; border: 1px solid rgba(96,165,250,0.3); }
  .dao-link:hover { background: rgba(96,165,250,0.25); }
  .todo-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; background: rgba(246,176,107,0.2); color: var(--orange); margin-left: 4px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading"><span class="dot-pulse">Chargement...</span></div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmt = n => n.toLocaleString('fr-FR');
const fmtUSD = n => '$' + fmt(Math.round(n));
const fmtBTC = (n, d=4) => n.toFixed(d) + ' BTC';
const arbscan = addr => `https://arbiscan.io/address/${addr}`;
const shortAddr = a => a.slice(0,6) + '…' + a.slice(-4);
const isZero = a => a === '0x0000000000000000000000000000000000000000';

async function load() {
  try {
    const basePath = location.pathname.replace(/\/+$/, '');
    const res = await fetch(basePath + '/api/data');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    render(d);
  } catch(e) {
    $('#app').innerHTML = '<div class="loading" style="color:var(--red)">Erreur: ' + e.message + '</div>';
  }
}

function render(d) {
  const a = d.aave;
  const g = d.gmx;
  const dao = d.dao;
  const nav = d.nav;

  let hfColor = 'green';
  if (a) {
    if (a.healthFactor < 1.5) hfColor = 'red';
    else if (a.healthFactor < 2.0) hfColor = 'orange';
  }
  const ltvPct = a ? (a.totalDebtUSD / a.totalCollateralUSD * 100).toFixed(1) : '—';

  $('#app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <img src="logo.svg" alt="BTSAVE" style="height:30px" onerror="this.style.display='none'">
          <div class="nav-toggle">
            <a href="/" class="nav-btn active">DASHBOARD</a>
            <a href="/simu.html" class="nav-btn">SIMU</a>
          </div>
        </div>
        <div style="text-align:right">
          <div class="phase-badge phase-${d.phase}">${d.phase}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:4px">Arbitrum</div>
        </div>
      </div>
      <div style="text-align:center;margin:12px 0 6px">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">BTC/USD</div>
        <div class="price-big">${d.price ? fmtUSD(d.price) : '—'}</div>
      </div>
    </div>

    <!-- NAV -->
    ${nav ? `
    <div class="grid">
      <div class="card" style="text-align:center">
        <div class="card-label">Total Assets</div>
        <div class="card-value green">${fmtUSD(nav.totalAssetsUSD)}</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="card-label">Net (Assets - Debt)</div>
        <div class="card-value">${fmtUSD(nav.netUSD)}</div>
      </div>
      <div class="card full" style="text-align:center">
        <div class="card-label">Prix TPB Token</div>
        <div class="card-value ${nav.tpbPrice > 0 ? '' : 'orange'}">${nav.tpbPrice > 0 ? '$' + nav.tpbPrice.toFixed(4) : 'TODO — vault non déployé'}</div>
      </div>
    </div>
    ` : ''}

    <!-- Arb gas info -->
    ${d.arb ? `
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:14px">⟠</span>
        <div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px">ETH (Arbitrum)</div>
          <div style="font-weight:700;font-size:15px">${d.arb.ethBalance.toFixed(4)} ETH</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px">Gas</div>
        <div style="font-weight:700;font-size:15px">${d.arb.gasPriceGwei} gwei</div>
      </div>
    </div>
    ` : ''}

    <!-- AAVE V3 Arbitrum -->
    ${a ? `
    <div class="section" style="padding:0;overflow:hidden">
      <div style="background:${hfColor === 'green' ? 'rgba(110,231,160,0.18)' : hfColor === 'orange' ? 'rgba(246,176,107,0.25)' : 'rgba(248,113,113,0.25)'};padding:8px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;opacity:0.9">🏦 AAVE V3 — Arbitrum</span>
        <span style="font-size:20px;font-weight:800">HF ${a.healthFactor.toFixed(2)}</span>
      </div>
      <div style="padding:12px">
        <div style="display:flex;gap:12px">
          <div style="flex:1;display:flex;flex-direction:column">
            <div class="card-label" style="margin-bottom:8px;color:var(--green)">✦ ACTIF</div>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <span style="font-size:16px">₿</span>
              <div>
                <div style="font-weight:700;font-size:14px">${fmtBTC(a.wbtcBTC)}</div>
              </div>
            </div>
            ${a.usdcCol > 1 ? `
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:16px">💵</span>
              <div>
                <div style="font-weight:700;font-size:14px">${fmtUSD(a.usdcCol)} <span class="card-sub">USDC</span></div>
              </div>
            </div>` : ''}
            <div style="flex:1"></div>
            <div style="padding-top:6px;border-top:1px solid var(--border)">
              <div class="card-sub">Total Collateral</div>
              <div style="font-weight:700">${fmtUSD(a.totalCollateralUSD)}</div>
            </div>
          </div>
          <div style="width:1px;background:var(--border)"></div>
          <div style="flex:1;display:flex;flex-direction:column">
            <div class="card-label" style="margin-bottom:8px;color:var(--red)">✦ DETTE</div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:16px">💵</span>
              <div>
                <div style="font-weight:700;font-size:14px">${fmtUSD(a.debtUSDC)} <span class="card-sub">USDC</span></div>
              </div>
            </div>
            <div style="flex:1"></div>
            <div style="padding-top:6px;border-top:1px solid var(--border)">
              <div class="card-sub">Total Debt</div>
              <div style="font-weight:700;color:var(--red)">${fmtUSD(a.totalDebtUSD)}</div>
            </div>
          </div>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span>LTV: ${ltvPct}%</span>
          <span>Net: ${fmtUSD(a.totalCollateralUSD - a.totalDebtUSD)}</span>
          <span>Borrow dispo: ${fmtUSD(a.availableBorrowsUSD)}</span>
        </div>
      </div>
    </div>
    ` : `
    <div class="section"><h3>🏦 AAVE V3</h3><div class="card-sub">Données indisponibles</div></div>
    `}

    <!-- GMX V2 Shorts -->
    <div class="section">
      <h3>📉 GMX V2 — Shorts BTC</h3>
      ${g.positions.length > 0 ? `
        ${g.positions.map(p => `
          <div class="pos-row">
            <div>
              <div style="font-weight:700">SHORT ${p.sizeBTC.toFixed(4)} BTC</div>
              <div class="card-sub">Collateral: ${fmtUSD(p.collateralUSD)}</div>
            </div>
            <div style="text-align:right">
              <div class="${p.pnlUSD >= 0 ? 'green' : 'red'}" style="font-weight:700">${p.pnlUSD >= 0 ? '+' : ''}${fmtUSD(p.pnlUSD)}</div>
              <div class="card-sub">Funding: ${p.fundingUSD >= 0 ? '+' : ''}${fmtUSD(p.fundingUSD)}</div>
            </div>
          </div>
        `).join('')}
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px">
          <span>Total: ${g.totalSizeBTC.toFixed(4)} BTC</span>
          <span class="${g.totalPnlUSD >= 0 ? 'green' : 'red'}">PnL: ${g.totalPnlUSD >= 0 ? '+' : ''}${fmtUSD(g.totalPnlUSD)}</span>
        </div>
      ` : `
        <div style="text-align:center;padding:16px;color:var(--muted)">
          Aucune position active
          <div style="font-size:10px;margin-top:4px">Phase: ${d.phase}</div>
        </div>
      `}
    </div>

    <!-- DAO -->
    <div class="section">
      <h3>🏛️ DAO & Gouvernance</h3>
      
      <div class="strat-var">
        <span class="label">Timelock Controller</span>
        <span class="val">${isZero(dao.timelockAddress) ? '<span class="todo-badge">TODO</span>' : '<a href="' + arbscan(dao.timelockAddress) + '" target="_blank" class="dao-link">' + shortAddr(dao.timelockAddress) + '</a>'}</span>
      </div>
      <div class="strat-var">
        <span class="label">Admin</span>
        <span class="val">${isZero(dao.roles.admin) ? '<span class="todo-badge">TODO</span>' : shortAddr(dao.roles.admin)}</span>
      </div>
      <div class="strat-var">
        <span class="label">Guardian</span>
        <span class="val">${isZero(dao.roles.guardian) ? '<span class="todo-badge">TODO</span>' : shortAddr(dao.roles.guardian)}</span>
      </div>
      <div class="strat-var">
        <span class="label">Keeper</span>
        <span class="val">${isZero(dao.roles.keeper) ? '<span class="todo-badge">TODO</span>' : shortAddr(dao.roles.keeper)}</span>
      </div>

      <div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
        <div class="card-label" style="margin-bottom:6px">NFT Bonus</div>
        <div style="display:flex;gap:12px">
          <div style="flex:1;text-align:center">
            <div style="font-weight:700;font-size:16px">${dao.nftBonus.totalHolders}</div>
            <div class="card-sub">Holders</div>
          </div>
          <div style="flex:1;text-align:center">
            <div style="font-weight:700;font-size:16px">${dao.nftBonus.cyclesCompleted}</div>
            <div class="card-sub">Cycles</div>
          </div>
        </div>
      </div>

      <div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
        <div class="card-label" style="margin-bottom:6px">Entry Fee</div>
        <div style="display:flex;gap:12px">
          <div style="flex:1;text-align:center">
            <div style="font-weight:700;font-size:16px">${(dao.fees.baseEntryFeeBps / 100).toFixed(2)}%</div>
            <div class="card-sub">Base</div>
          </div>
          <div style="flex:1;text-align:center">
            <div style="font-weight:700;font-size:16px;color:var(--green)">${(dao.fees.effectiveFeeBps / 100).toFixed(2)}%</div>
            <div class="card-sub">Effective (NFT)</div>
          </div>
          <div style="flex:1;text-align:center">
            <div style="font-weight:700;font-size:16px">${dao.fees.nftDiscountPct}%</div>
            <div class="card-sub">Discount</div>
          </div>
        </div>
      </div>

      <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px">
        ${Object.entries(dao.contracts).map(([name, addr]) => 
          isZero(addr) 
            ? '<span class="todo-badge">' + name + '</span>'
            : '<a href="' + arbscan(addr) + '" target="_blank" class="dao-link">' + name + '</a>'
        ).join('')}
      </div>
    </div>

    <div class="footer">
      <span class="live-dot"></span> Mis à jour: ${new Date().toLocaleString('fr-FR')} — Auto-refresh 60s<br>
      BTSAVE — Full On-Chain Arbitrum (AAVE V3 + GMX V2)<br>
    </div>
  `;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
