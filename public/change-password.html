<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPB — Changement de mot de passe obligatoire</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 2rem; width: 380px; }
  h2 { color: #f7931a; margin-bottom: 0.5rem; font-size: 1.2rem; }
  .warn { background: #2a1a0a; border: 1px solid #f7931a; border-radius: 8px; padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: #f7931a; }
  label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #888; }
  input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 0.95rem; }
  input:focus { outline: none; border-color: #f7931a; }
  button { width: 100%; padding: 0.7rem; background: #f7931a; color: #000; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; }
  button:hover { background: #e8850f; }
  .error { background: #2a0a0a; border: 1px solid #e74c3c; border-radius: 8px; padding: 0.6rem; margin-bottom: 1rem; color: #e74c3c; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="card">
  <h2>🔒 Changement de mot de passe</h2>
  <div class="warn">
    Votre mot de passe a été exposé suite à un incident de sécurité. Vous devez le changer avant de continuer.
  </div>
  <div id="errorBox" class="error" style="display:none"></div>
  <form method="POST" action="auth/change-password">
    <label for="current">Mot de passe actuel</label>
    <input type="password" id="current" name="current" required>
    <label for="newpwd">Nouveau mot de passe (8 caractères min.)</label>
    <input type="password" id="newpwd" name="newpwd" required minlength="8">
    <label for="confirm">Confirmer le nouveau mot de passe</label>
    <input type="password" id="confirm" name="confirm" required minlength="8">
    <button type="submit">Changer le mot de passe</button>
  </form>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    if (err === 'wrong') box.textContent = 'Mot de passe actuel incorrect.';
    else if (err === 'short') box.textContent = 'Le nouveau mot de passe doit faire au moins 8 caractères.';
    else if (err === 'mismatch') box.textContent = 'Les mots de passe ne correspondent pas.';
  }
</script>
</body>
</html>
